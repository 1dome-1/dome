<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crystal Hunter Play</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; font-family:Segoe UI, Tahoma, sans-serif; background:#020617; color:#f8fafc; min-height:100vh; display:grid; place-items:center; padding:12px; }
    .panel { width:min(100%, 1040px); background:rgba(2,6,23,.9); border:1px solid #38bdf8; border-radius:16px; padding:12px; box-shadow:0 18px 45px rgba(0,0,0,.35); }
    .top { display:flex; justify-content:space-between; gap:10px; align-items:center; margin-bottom:10px; flex-wrap:wrap; }
    .lang { display:flex; gap:8px; flex-wrap:wrap; }
    button { border:0; border-radius:999px; padding:8px 12px; background:#38bdf8; color:white; cursor:pointer; }
    button.secondary { background:#475569; }
    canvas { width:100%; height:auto; display:block; border-radius:12px; background:#07111f; border:1px solid #4f8cff; touch-action:none; }
    .hint { text-align:center; color:#cbd5e1; margin-top:8px; font-size:14px; }
  </style>
</head>
<body>
  <div class="panel">
    <div class="top">
      <div>
        <div id="title">Crystal Hunter</div>
        <div id="subtitle">Lightweight browser game</div>
      </div>
      <div class="lang">
        <button class="secondary" onclick="setLang('en')">EN</button>
        <button class="secondary" onclick="setLang('th')">TH</button>
        <button class="secondary" onclick="setLang('ja')">JA</button>
        <button class="secondary" onclick="setLang('zh')">ZH</button>
      </div>
    </div>
    <canvas id="game" width="960" height="600"></canvas>
    <div class="hint" id="hint">Move with WASD / Arrow keys • Attack with Space • Collect crystals • Press R to restart</div>
  </div>
  <script>
    const langData = {
      en: {title:'Crystal Hunter', subtitle:'Lightweight browser game', hint:'Move with WASD / Arrow keys • Attack with Space • Collect crystals • Press R to restart'},
      th: {title:'คริสตัล ฮันเตอร์', subtitle:'เกมเบราว์เซอร์ที่เบาและเล่นง่าย', hint:'เดินด้วย WASD / ลูกศร • โจมตีด้วย Space • เก็บคริสตัล • กด R เพื่อเริ่มใหม่'},
      ja: {title:'クリスタルハンター', subtitle:'軽量なブラウザゲーム', hint:'WASD / 矢印キーで移動 • Spaceで攻撃 • クリスタルを集める • Rでリスタート'},
      zh: {title:'水晶猎人', subtitle:'轻量网页游戏', hint:'用 WASD / 方向键移动 • 用 Space 攻击 • 收集水晶 • 按 R 重新开始'}
    };
    let lang='en';
    const state={player:{x:120,y:120,size:24,hp:100,maxHp:100,gold:0,score:0,attack:12,speed:4.2}, enemies:[], crystals:[], particles:[], texts:[], wave:1, paused:false};
    const keys={};
    const canvas=document.getElementById('game');
    const ctx=canvas.getContext('2d');
    function setLang(code){ lang=code; document.getElementById('title').textContent=langData[code].title; document.getElementById('subtitle').textContent=langData[code].subtitle; document.getElementById('hint').textContent=langData[code].hint; }
    function rand(a,b){return Math.random()*(b-a)+a;}
    function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
    function createCrystal(){return {x:rand(40,canvas.width-40),y:rand(60,canvas.height-60),size:16,pulse:rand(0,Math.PI*2),color:'#38bdf8'};}
    function createEnemy(){return {x:rand(80,canvas.width-80),y:rand(90,canvas.height-90),size:24,hp:30,maxHp:30,speed:1.3};}
    function spawnWave(){ state.enemies=[]; for(let i=0;i<4+state.wave;i++) state.enemies.push(createEnemy()); }
    function addText(x,y,text,color){ state.texts.push({x,y,text,color,life:70,vy:-0.8}); }
    function update(dt){ const mx=(keys['ArrowRight']||keys['d']?1:0)-(keys['ArrowLeft']||keys['a']?1:0); const my=(keys['ArrowDown']||keys['s']?1:0)-(keys['ArrowUp']||keys['w']?1:0); const len=Math.hypot(mx,my)||1; if(mx||my){ state.player.x += (mx/len)*state.player.speed; state.player.y += (my/len)*state.player.speed; }
      state.player.x=clamp(state.player.x,0,canvas.width-state.player.size); state.player.y=clamp(state.player.y,0,canvas.height-state.player.size);
      state.enemies.forEach(e=>{ const dx=state.player.x+state.player.size/2-(e.x+e.size/2); const dy=state.player.y+state.player.size/2-(e.y+e.size/2); const dist=Math.hypot(dx,dy)||1; e.x += (dx/dist)*e.speed; e.y += (dy/dist)*e.speed; if(Math.hypot(state.player.x-e.x, state.player.y-e.y)<24){ state.player.hp-=1; if(state.player.hp<=0){state.player.hp=100; state.player.gold=0; state.player.score=0;}} });
      for(let i=state.crystals.length-1;i>=0;i--){ const c=state.crystals[i]; if(Math.hypot(state.player.x+state.player.size/2-(c.x+c.size/2), state.player.y+state.player.size/2-(c.y+c.size/2))<20){ state.player.gold+=10; state.player.score+=10; addText(c.x,c.y,'+10','#facc15'); state.crystals.splice(i,1); state.crystals.push(createCrystal()); }}
      for(let i=state.texts.length-1;i>=0;i--){ const t=state.texts[i]; t.y += t.vy*dt*0.06; t.life-=dt; if(t.life<=0) state.texts.splice(i,1); }
      if((keys[' ']||keys['Space']) && !state.lastAttack){ state.enemies.forEach(e=>{if(Math.hypot(state.player.x-e.x,state.player.y-e.y)<42){e.hp-=state.player.attack; if(e.hp<=0){state.player.gold+=15; state.player.score+=20; addText(e.x,e.y,'+15','#34d399');}}}); state.lastAttack=1; } if(!(keys[' ']||keys['Space'])) state.lastAttack=0; }
    function draw(){ ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#020617'; ctx.fillRect(0,0,canvas.width,canvas.height); state.crystals.forEach(c=>{ctx.save(); ctx.translate(c.x+c.size/2,c.y+c.size/2); ctx.scale(1+Math.sin(c.pulse)*0.05,1+Math.sin(c.pulse)*0.05); ctx.fillStyle=c.color; ctx.fillRect(-c.size/2,-c.size/2,c.size,c.size); ctx.restore(); c.pulse+=0.08;}); state.enemies.forEach(e=>{ctx.fillStyle='#ef4444'; ctx.fillRect(e.x,e.y,e.size,e.size);}); ctx.fillStyle='#22c55e'; ctx.fillRect(state.player.x,state.player.y,state.player.size,state.player.size); ctx.fillStyle='#f8fafc'; ctx.font='16px Segoe UI'; ctx.fillText(`HP ${state.player.hp}`,14,24); ctx.fillText(`Gold ${state.player.gold}`,14,44); ctx.fillText(`Score ${state.player.score}`,14,64); state.texts.forEach(t=>{ctx.fillStyle=t.color; ctx.font='bold 14px Segoe UI'; ctx.fillText(t.text,t.x,t.y);}); }
    function loop(ts){ const dt=Math.min(32,ts-(loop.last||ts)); loop.last=ts; update(dt); draw(); requestAnimationFrame(loop); }
    document.addEventListener('keydown',e=>{keys[e.key]=true; if(e.key.toLowerCase()==='r'){state.player={x:120,y:120,size:24,hp:100,maxHp:100,gold:0,score:0,attack:12,speed:4.2}; spawnWave();} if(e.key==='Escape') state.paused=!state.paused;}); document.addEventListener('keyup',e=>{keys[e.key]=false;}); for(let i=0;i<6;i++) state.crystals.push(createCrystal()); spawnWave(); setLang('en'); requestAnimationFrame(loop);
  </script>
</body>
</html>
